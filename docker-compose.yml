version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: velib_postgres
    environment:
      POSTGRES_USER: velib
      POSTGRES_PASSWORD: velib
      POSTGRES_DB: velib_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  minio:
    image: minio/minio:latest
    container_name: velib_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    container_name: velib_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/velib-raw;
      mc mb --ignore-existing local/velib-staging;
      mc mb --ignore-existing local/velib-curated;
      exit 0;
      "

  n8n:
    image: n8nio/n8n:latest
    container_name: velib_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=https://deepwater-yaretzi-impressively.ngrok-free.dev/
    depends_on:
      - postgres
      - minio

  metabase:
    image: metabase/metabase:latest
    container_name: velib_metabase
    ports:
      - "3000:3000"
    volumes:
      - ./metabase-data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      - postgres

volumes:
  pgdata:
  miniodata:

